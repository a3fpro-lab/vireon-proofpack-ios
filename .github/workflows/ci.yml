name: proofpack-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanity import (vproofpack)
        run: python -c "import vproofpack; print('import ok')"

      - name: Syntax check
        run: python -m compileall -q .

      - name: Generate demo_pack
        run: python make_demo_pack.py

      - name: Schema checks (lightweight)
        run: python tools/schema_check.py

      - name: Verify demo_pack
        run: python verify_demo_pack.py

      - name: Verify demo_pack (strict policy)
        run: python tools/verify_pack_strict.py demo_pack --k 2 --min-issuers 1 --max-window 86400

      - name: Attack suite (expected FAIL modes)
        run: python tools/attack_suite.py
