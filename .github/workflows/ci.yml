name: proofpack-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall -q .

      - name: Generate demo_pack
        run: python make_demo_pack.py

      - name: Verify demo_pack
        run: python verify_demo_pack.py
