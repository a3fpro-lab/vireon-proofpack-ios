name: proofpack-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanity import (vproofpack)
        run: python -c "import vproofpack; print('import ok')"

      - name: Syntax check
        run: python -m compileall -q .

      - name: Install package (pip)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: CLI sanity (vps)
        run: vps --help

      - name: Generate demo_pack (script)
        run: python make_demo_pack.py

      - name: Schema checks (lightweight)
        run: python tools/schema_check.py

      - name: Verify demo_pack (script)
        run: python verify_demo_pack.py

      - name: Verify demo_pack (strict policy)
        run: python tools/verify_pack_strict.py demo_pack --k 2 --min-issuers 1 --max-window 86400

      - name: Generate demo_pack via CLI
        run: |
          rm -rf demo_pack_cli
          vps make-demo --out demo_pack_cli --steps 50 --eta 0.1 --k 2

      - name: Verify demo_pack via CLI
        run: vps verify demo_pack_cli --k 2

      - name: Verify demo_pack via CLI (strict)
        run: vps verify-strict demo_pack_cli --k 2 --min-issuers 1 --max-window 86400

      - name: Attack suite (expected FAIL modes)
        run: python tools/attack_suite.py

      - name: RL artifacts (stdlib demo)
        run: python examples/rl_minicartpole.py

      - name: RL proofpack seal
        run: python examples/make_rl_proofpack.py

      - name: RL proofpack verify (strict)
        run: python tools/verify_pack_strict.py demo_rl_pack --k 2 --min-issuers 1 --max-window 86400

      - name: RL tamper demo (must fail after 1-bit flip)
        run: python examples/rl_tamper_demo.py

      - name: Generate pinned test vectors
        run: python tools/generate_test_vectors.py

      - name: Verify pinned test vectors (root digest locked)
        run: python tools/verify_test_vectors.py
